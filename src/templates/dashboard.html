<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkhaus Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <main class="dashboard">
        <header class="topbar">
            <h1>Parkhaus Management</h1>
            <div class="clock">
                <span id="current-date">--.--.----</span>
                <span id="current-time">--:--:--</span>
            </div>
        </header>

        <section class="entry-panel">
            <h2>Kennzeichen-Eingabe</h2>
            <label for="kennzeichen-input">Kennzeichen</label>
            <input type="text" id="kennzeichen-input" placeholder="A 1234" pattern="[A-Z] [0-9]{4}" maxlength="6" required>
            <div class="button-row">
                <button id="btn-hinzufuegen" class="btn btn-warning">Notfall Einfahrt</button>
                <button id="btn-dauerparker" class="btn btn-success">Dauerparker hinzufügen</button>
                <button id="btn-notfall-ausfahrt" class="btn btn-danger">Notfall Ausfahrt</button>
            </div>
            <div class="gate-status">
                <div><strong>Einfahrt</strong><span id="gate-entry-status">Schranke zu</span></div>
                <div><strong>Ausfahrt</strong><span id="gate-exit-status">Schranke zu</span></div>
            </div>
        </section>

        <section class="camera-panel">
            <div class="camera-card">
                <h2>Einfahrt</h2>
                <div class="camera-window">
                    <img src="{{ url_for('get_kamera_stream') }}" alt="Livebild der Einfahrt-Kamera" id="kamera-stream">
                </div>
                <div class="camera-meta">
                    <span id="kamera-status">Kamera wird gestartet</span>
                    <span id="kamera-kennzeichen">Erkannt: -</span>
                </div>
            </div>

            <div class="camera-card">
                <h2>Ausfahrt</h2>
                <div class="camera-window">
                    <img src="{{ url_for('get_ausfahrt_kamera_stream') }}" alt="Livebild der Ausfahrt-Kamera" id="kamera-stream-ausfahrt">
                </div>
                <div class="camera-meta">
                    <span id="kamera-status-ausfahrt">Kamera wird gestartet</span>
                    <span id="kamera-kennzeichen-ausfahrt">Erkannt: -</span>
                </div>
            </div>
        </section>

        <section class="active-panel">
            <div class="section-head">
                <h2>Aktive Fahrzeuge</h2>
                <span id="parkhaus-counter">0 / 15</span>
            </div>
            <div id="aktive-parkvorgaenge">
                <div class="no-data">Keine Fahrzeuge im Parkhaus</div>
            </div>
            <div class="pagination" id="fahrzeug-pagination"></div>
        </section>

        <section class="permanent-panel">
            <div class="section-head">
                <h2>Dauerparker</h2>
                <span class="price-badge">365 EUR</span>
            </div>
            <div id="dauerparker-list">
                <div class="no-data">Keine Dauerparker gebucht</div>
            </div>
        </section>

        <div id="toast" class="toast" role="status"></div>
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
